# @package _global_
module:
  _target_: emg2qwerty.lightning.TDSRNNCTCModule
  in_features: 528
  mlp_features: [384]
  block_channels: [24, 24, 24, 24]
  kernel_width: 32

  rnn_type: gru
  rnn_hidden: 256
  rnn_layers: 2
  bidirectional: true
  rnn_dropout: 0.1

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000  # 4 sec windows for 2kHz EMG
  padding: [1800, 200]  # 900ms past context, 100ms future context
  train_jitter: false
  train_augment: false
  train_augment_gauss: false
